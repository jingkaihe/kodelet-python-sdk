name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-sdk:
    name: Python SDK
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run -- ruff check

      - name: Type check
        run: uv run -- ty check

      - name: Test
        run: uv run -- pytest -q

      - name: Build
        run: uv build
